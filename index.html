<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Dinner Dashboard</title>
<style>
  :root {
    --primary: #1a3a5c;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); }

  /* Header */
  .header { background:var(--primary); color:#fff; padding:20px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .header h1 { font-size:1.5rem; font-weight:700; }
  .header-meta { display:flex; gap:16px; align-items:center; font-size:0.85rem; opacity:0.85; }

  /* Event tabs */
  .tabs { display:flex; gap:8px; padding:16px 32px; background:#fff; border-bottom:1px solid var(--border); }
  .tab { padding:8px 20px; border-radius:8px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:0.9rem; font-weight:500; transition:all .2s; }
  .tab:hover { background:var(--accent-light); }
  .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* Main layout */
  .main { max-width:1400px; margin:0 auto; padding:24px 32px; }

  /* KPI row */
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
  .kpi-label { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
  .kpi-value { font-size:1.8rem; font-weight:700; }
  .kpi-sub { font-size:0.8rem; color:var(--muted); margin-top:4px; }
  .kpi-value.green { color:var(--success); }
  .kpi-value.blue { color:var(--accent); }
  .kpi-value.orange { color:var(--warning); }

  /* Section */
  .section { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:20px; }
  .section h2 { font-size:1.1rem; font-weight:600; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border); }

  /* Table */
  table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  th { text-align:left; padding:10px 12px; background:#f1f5f9; font-weight:600; color:var(--muted); font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em; }
  td { padding:10px 12px; border-top:1px solid var(--border); }
  tr:hover td { background:#f8fafc; }

  /* Status badges */
  .badge { display:inline-block; padding:2px 10px; border-radius:99px; font-size:0.75rem; font-weight:500; }
  .badge-green { background:#dcfce7; color:#166534; }
  .badge-yellow { background:#fef9c3; color:#854d0e; }
  .badge-red { background:#fee2e2; color:#991b1b; }
  .badge-gray { background:#f1f5f9; color:#475569; }

  /* Progress bar */
  .progress-bar { height:8px; background:#e2e8f0; border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:99px; transition:width .5s; }

  /* Grid 2 cols */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:900px) { .grid-2 { grid-template-columns:1fr; } }

  /* Loading / Error */
  .loading { text-align:center; padding:60px 20px; color:var(--muted); }
  .loading .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-box { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; padding:16px; border-radius:var(--radius); text-align:center; margin:24px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>VIP Dinner Dashboard</h1>
  <div class="header-meta">
    <span id="lastRefresh">Loading...</span>
    <span>Auto-refresh: 3 min</span>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div class="main" id="app">
  <div class="loading"><div class="spinner"></div>Loading data from Google Sheets...</div>
</div>

<script>
// ── CONFIG ──
const CONFIG = {
  sheetId: "1IuDnVMB4SwjA-6Ei-j_Af4JExCUUKDhHsy4LjkrbO1s",
  refreshMs: 180000,
  events: [
    { key: "pbw", label: "PBW 2026 — April 14", color: "#2563eb" },
    { key: "raise", label: "RAISE Summit — July 8-9", color: "#7c3aed" }
  ]
};

let EVENTS = {};
let activeEvent = "pbw";
let lastRefresh = null;

// ── FETCH with headers param ──
async function fetchSheet(name, headerRows = 1) {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=${headerRows}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const txt = await res.text();
  const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\)/);
  if (!m) throw new Error("Invalid response from Google Sheets");
  const tbl = JSON.parse(m[1]).table;

  // Use cols[i].label as column headers (properly populated with headers=1+)
  const headers = tbl.cols.map((c, i) => {
    const lbl = (c.label || "").trim();
    return lbl || `col_${i}`;
  });

  // Convert rows to objects
  return tbl.rows.map(r => {
    const obj = {};
    headers.forEach((h, i) => {
      const cell = (r.c && r.c[i]) ? r.c[i] : null;
      if (!cell) { obj[h] = null; return; }
      // Prefer .v (value), fall back to .f (formatted)
      obj[h] = (cell.v !== undefined && cell.v !== null) ? cell.v : (cell.f || null);
    });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v !== null && v !== ""));
}

// ── Org name normalization ──
function normOrg(name) {
  return (name || "").toLowerCase().replace(/\s+/g, "").replace(/[^a-z0-9]/g, "");
}

// ── PROCESS DATA ──
function processData(allGuests, sponsorTables, summary) {
  // --- PBW event ---
  const ag = allGuests.filter(r => r["REGISTRANT TYPE"]);

  // Sponsor tables data
  const tables = sponsorTables.filter(r => r["SPONSOR'S TABLES"]);
  const totalTableRevenue = tables.reduce((s, r) => s + (parseFloat(r["TABLE REVENUE"]) || 0), 0);
  const totalTableSeats = tables.reduce((s, r) => s + (parseFloat(r["CONTRACT"]) || 0), 0);

  // By registrant type
  const byType = {};
  ag.forEach(r => {
    const t = r["REGISTRANT TYPE"];
    if (!byType[t]) byType[t] = { count: 0, registered: 0, amount: 0, confirmed: 0, shuttle: 0 };
    byType[t].count++;
    if (r["FULL NAME"] && String(r["FULL NAME"]).trim()) byType[t].registered++;
    byType[t].amount += parseFloat(r["AMOUNT ALLOCATED TO THE VIP DINNER"]) || 0;
    const rsvp = (r["RSVP STATUS"] || "").toLowerCase();
    if (rsvp === "attending" || rsvp === "confirmed") byType[t].confirmed++;
    if ((r["SHUTTLE"] || "").toString().toLowerCase() === "yes") byType[t].shuttle++;
  });

  // Ticket revenue (contract tickets + individual tickets)
  const ticketRevenue = (byType["Contract ticket"]?.amount || 0) + (byType["Ticket"]?.amount || 0);
  const totalRevenue = ticketRevenue + totalTableRevenue;

  // RSVP counts across all guests
  const rsvpCounts = { attending: 0, pending: 0, declined: 0, unknown: 0 };
  ag.forEach(r => {
    const s = (r["RSVP STATUS"] || "").toLowerCase().trim();
    if (s === "attending" || s === "confirmed") rsvpCounts.attending++;
    else if (s === "declined" || s === "cancelled") rsvpCounts.declined++;
    else if (s === "" || !s) rsvpCounts.unknown++;
    else rsvpCounts.pending++;
  });

  // Build sponsor table details with org matching
  const sponsorDetails = tables.map(t => {
    const orgName = t["SPONSOR'S TABLES"] || "";
    const normName = normOrg(orgName);
    // Find matching guests from ALL GUESTS
    const matchingGuests = ag.filter(g =>
      (g["REGISTRANT TYPE"] === "Contract table") && normOrg(g["ORGANIZATION"]) === normName
    );
    const registeredGuests = matchingGuests.filter(g => g["FULL NAME"] && String(g["FULL NAME"]).trim());
    const confirmedGuests = matchingGuests.filter(g => {
      const s = (g["RSVP STATUS"] || "").toLowerCase();
      return s === "attending" || s === "confirmed";
    });

    return {
      cs: t["CS"] || "",
      name: orgName,
      contract: parseFloat(t["CONTRACT"]) || 0,
      revenue: parseFloat(t["TABLE REVENUE"]) || 0,
      totalGuests: matchingGuests.length,
      registered: registeredGuests.length,
      confirmed: confirmedGuests.length,
      remaining: parseFloat(t["REMAINING SEATS"]) || (parseFloat(t["CONTRACT"]) || 0) - matchingGuests.length,
      effectiveConfirmed: parseFloat(t["EFFECTIVE GUESTS WHO CONFIRMED"]) || confirmedGuests.length
    };
  });

  // Summary data (2025 vs 2026)
  const summaryTotal = summary.find(r => (r["Category"] || "").toLowerCase() === "total");

  // Shuttle count
  const shuttleCount = ag.filter(r => (r["SHUTTLE"] || "").toString().toLowerCase() === "yes").length;

  const pbw = {
    key: "pbw",
    totalRevenue,
    ticketRevenue,
    tableRevenue: totalTableRevenue,
    totalGuests: ag.length,
    registeredGuests: ag.filter(r => r["FULL NAME"] && String(r["FULL NAME"]).trim()).length,
    totalTableSeats,
    sponsorTableCount: tables.length,
    byType,
    rsvpCounts,
    sponsorDetails,
    shuttleCount,
    summary: summaryTotal ? {
      quota2026: parseFloat(summaryTotal["Quota 2026"]) || 0,
      registered2026: parseFloat(summaryTotal["Registered names"]) || 0,
      confirmed2026: parseFloat(summaryTotal["Confirmed"]) || 0,
      revenue2026: parseFloat(summaryTotal["Revenue"]) || 0,
      attended2025: parseFloat(summaryTotal["Attended 2025"]) || 0,
      quota2025: parseFloat(summaryTotal["Quota 2025"]) || 0,
    } : null,
    summaryRows: summary.filter(r => r["Category"] && (r["Category"] || "").toLowerCase() !== "total" && (r["Category"] || "").toLowerCase() !== "coe staff (seated)")
  };

  return { pbw, raise: null };
}

// ── FORMAT HELPERS ──
function fmt(n) { return n != null ? "€" + Math.round(n).toLocaleString("fr-FR") : "—"; }
function pct(n, d) { return d ? Math.round(n / d * 100) + "%" : "—"; }
function rsvpBadge(status) {
  const s = (status || "").toLowerCase().trim();
  if (s === "attending" || s === "confirmed") return `<span class="badge badge-green">Attending</span>`;
  if (s === "declined" || s === "cancelled") return `<span class="badge badge-red">Declined</span>`;
  if (s === "" || !s) return `<span class="badge badge-gray">No RSVP</span>`;
  return `<span class="badge badge-yellow">${status}</span>`;
}

// ── RENDER ──
function render() {
  // Update refresh time
  if (lastRefresh) {
    document.getElementById("lastRefresh").textContent = "Updated: " + lastRefresh.toLocaleTimeString();
  }

  // Tabs
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = CONFIG.events.map(e =>
    `<button class="tab ${activeEvent === e.key ? 'active' : ''}" onclick="switchEvent('${e.key}')" style="${activeEvent === e.key ? `background:${e.color};border-color:${e.color}` : ''}">${e.label}</button>`
  ).join("");

  const app = document.getElementById("app");
  const ev = EVENTS[activeEvent];

  if (!ev) {
    app.innerHTML = `<div class="section" style="text-align:center;padding:60px 20px;color:var(--muted)">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:16px"><path d="M12 6v6l4 2M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
      <h3 style="margin-bottom:8px">Coming Soon</h3>
      <p>Data for this event will be available when registration opens.</p>
    </div>`;
    return;
  }

  const regPct = ev.summary ? pct(ev.summary.registered2026, ev.summary.quota2026) : pct(ev.registeredGuests, ev.totalGuests);
  const confPct = pct(ev.rsvpCounts.attending, ev.totalGuests);

  app.innerHTML = `
    <!-- KPI ROW -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Total Revenue</div>
        <div class="kpi-value green">${fmt(ev.totalRevenue)}</div>
        <div class="kpi-sub">Tables: ${fmt(ev.tableRevenue)} · Tickets: ${fmt(ev.ticketRevenue)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Total Guests</div>
        <div class="kpi-value blue">${ev.totalGuests}</div>
        <div class="kpi-sub">Registered: ${ev.registeredGuests} · Quota: ${ev.summary?.quota2026 || "—"}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Sponsor Tables</div>
        <div class="kpi-value">${ev.sponsorTableCount}</div>
        <div class="kpi-sub">${ev.totalTableSeats} contracted seats</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">RSVP Confirmed</div>
        <div class="kpi-value green">${ev.rsvpCounts.attending}</div>
        <div class="kpi-sub">${confPct} of total · Declined: ${ev.rsvpCounts.declined}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Shuttle Requests</div>
        <div class="kpi-value orange">${ev.shuttleCount}</div>
        <div class="kpi-sub">Guests requesting transport</div>
      </div>
    </div>

    <!-- BREAKDOWN + RSVP -->
    <div class="grid-2">
      <div class="section">
        <h2>Guest Breakdown by Type</h2>
        <table>
          <thead><tr><th>Type</th><th>Total</th><th>Registered</th><th>Revenue</th></tr></thead>
          <tbody>
            ${Object.entries(ev.byType).map(([type, d]) => `
              <tr>
                <td><strong>${type}</strong></td>
                <td>${d.count}</td>
                <td>${d.registered}</td>
                <td>${d.amount > 0 ? fmt(d.amount) : '<span style="color:var(--muted)">—</span>'}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>

      <div class="section">
        <h2>RSVP Status Overview</h2>
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.85rem">
            <span>Confirmed: ${ev.rsvpCounts.attending}</span>
            <span>${confPct}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${ev.totalGuests ? (ev.rsvpCounts.attending / ev.totalGuests * 100) : 0}%;background:var(--success)"></div>
          </div>
        </div>
        <table>
          <thead><tr><th>Status</th><th>Count</th><th>%</th></tr></thead>
          <tbody>
            <tr><td><span class="badge badge-green">Attending</span></td><td>${ev.rsvpCounts.attending}</td><td>${pct(ev.rsvpCounts.attending, ev.totalGuests)}</td></tr>
            <tr><td><span class="badge badge-yellow">Pending</span></td><td>${ev.rsvpCounts.pending}</td><td>${pct(ev.rsvpCounts.pending, ev.totalGuests)}</td></tr>
            <tr><td><span class="badge badge-gray">No RSVP</span></td><td>${ev.rsvpCounts.unknown}</td><td>${pct(ev.rsvpCounts.unknown, ev.totalGuests)}</td></tr>
            <tr><td><span class="badge badge-red">Declined</span></td><td>${ev.rsvpCounts.declined}</td><td>${pct(ev.rsvpCounts.declined, ev.totalGuests)}</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- SPONSOR TABLES -->
    <div class="section">
      <h2>Sponsor Tables (${ev.sponsorTableCount})</h2>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Sponsor</th><th>CS</th><th>Seats</th><th>Revenue</th><th>Registered</th><th>Confirmed</th><th>Fill Rate</th></tr></thead>
          <tbody>
            ${ev.sponsorDetails.map(t => {
              const fill = t.contract > 0 ? Math.round(t.totalGuests / t.contract * 100) : 0;
              const fillColor = fill >= 80 ? "var(--success)" : fill >= 50 ? "var(--warning)" : "var(--danger)";
              return `
                <tr>
                  <td><strong>${t.name}</strong></td>
                  <td>${t.cs || "—"}</td>
                  <td>${t.contract}</td>
                  <td>${fmt(t.revenue)}</td>
                  <td>${t.registered} / ${t.totalGuests}</td>
                  <td>${t.confirmed}</td>
                  <td>
                    <div style="display:flex;align-items:center;gap:8px">
                      <div class="progress-bar" style="width:80px">
                        <div class="progress-fill" style="width:${Math.min(fill, 100)}%;background:${fillColor}"></div>
                      </div>
                      <span style="font-size:0.8rem;color:${fillColor}">${fill}%</span>
                    </div>
                  </td>
                </tr>
              `;
            }).join("")}
            <tr style="font-weight:700;background:#f1f5f9">
              <td>TOTAL</td>
              <td></td>
              <td>${ev.totalTableSeats}</td>
              <td>${fmt(ev.tableRevenue)}</td>
              <td>${ev.sponsorDetails.reduce((s,t)=>s+t.registered,0)} / ${ev.sponsorDetails.reduce((s,t)=>s+t.totalGuests,0)}</td>
              <td>${ev.sponsorDetails.reduce((s,t)=>s+t.confirmed,0)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 2025 vs 2026 COMPARISON -->
    ${ev.summaryRows && ev.summaryRows.length > 0 ? `
    <div class="section">
      <h2>2025 vs 2026 Comparison</h2>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Category</th><th>Quota 2025</th><th>Attended 2025</th><th>Quota 2026</th><th>Registered 2026</th><th>Confirmed 2026</th><th>Revenue 2026</th></tr></thead>
          <tbody>
            ${ev.summaryRows.map(r => `
              <tr>
                <td><strong>${r["Category"]}</strong></td>
                <td>${r["Quota 2025"] ?? "—"}</td>
                <td>${r["Attended 2025"] ?? "—"}</td>
                <td>${r["Quota 2026"] ?? "—"}</td>
                <td>${r["Registered names"] ?? "—"}</td>
                <td>${r["Confirmed"] ?? "—"}</td>
                <td>${r["Revenue"] != null ? fmt(r["Revenue"]) : "—"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
    ` : ""}
  `;
}

function switchEvent(key) {
  activeEvent = key;
  render();
}

// ── LOAD ──
async function loadAndRender() {
  try {
    const [ag, st, su] = await Promise.all([
      fetchSheet("ALL GUESTS", 1),
      fetchSheet("SPONSOR TABLES", 1),
      fetchSheet("SUMMARY", 2),
    ]);
    EVENTS = processData(ag, st, su);
    lastRefresh = new Date();
    render();
  } catch (err) {
    console.error("Dashboard error:", err);
    document.getElementById("app").innerHTML = `
      <div class="error-box">
        <strong>Failed to load data</strong><br>
        ${err.message}<br><br>
        <small>Make sure the Google Sheet is shared as "Anyone with the link" → Viewer.<br>
        This dashboard must be served over HTTPS (e.g. GitHub Pages), not opened as a local file.</small>
      </div>`;
  }
}

loadAndRender();
setInterval(loadAndRender, CONFIG.refreshMs);
</script>
</body>
</html>
