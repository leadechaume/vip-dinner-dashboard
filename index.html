<style>

  .section {

  table { width:100%; border-collapse:separate; border-spacing:0; font-size:13px; }

  .rev-bar { display:flex; height:18px; border-radius:9px; overflow:hidden; background:#e5e7eb; }

  .badge { display:inline-block; padding:2px 10px; border-radius:99px; font-size:12px; font-weight:500; }
  .badge-green { background:#dcfce7; color:#166534; }
  .badge-yellow { background:#fef9c3; color:#854d0e; }

  .rsvp-prog { margin-bottom:16px; }

  .loading { text-align:center; padding:80px 20px; color:var(--muted); }

</style>

<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>VIP Dinner Revenue Dashboard</h1>
      <div class="header-sub">Track revenue, break-even progress &amp; guest management</div>
    </div>
    <div class="header-meta" id="lastRefresh">Loading...</div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="main" id="app">
  <div class="loading"><div class="spinner"></div>Loading data from Google Sheets...</div>
</div>

<script>
const CONFIG = {
  sheetId: "1IuDnVMB4SwjA-6Ei-j_Af4JExCUUKDhHsy4LjkrbO1s",
  refreshMs: 180000,
  breakEvenCost: 470000,
  events: [
    { key: "pbw", label: "Paris Blockchain Week", short: "PBW", date: "2026-04-14", color: "#6366f1" },
    { key: "raise", label: "RAISE Summit", short: "RAISE", date: "2026-07-08", color: "#7c3aed" }
  ]
};

let EVENTS = {};
let activeEvent = "pbw";
let lastRefresh = null;

const ICONS = {
  revenue: `<svg fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>`,
  table: `<svg fill="none" stroke="#6366f1" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`,
  ticket: `<svg fill="none" stroke="#8b5cf6" stroke-width="2" viewBox="0 0 24 24"><path d="M2 9a3 3 0 013-3h14a3 3 0 013 3v0a3 3 0 01-3 3v1a3 3 0 013 3v0a3 3 0 01-3 3H5a3 3 0 01-3-3v0a3 3 0 013-3v-1a3 3 0 01-3-3z"/></svg>`,
  person: `<svg fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  shuttle: `<svg fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"><path d="M5 17h14M5 17a2 2 0 01-2-2V7a4 4 0 014-4h10a4 4 0 014 4v8a2 2 0 01-2 2M5 17l-1 4h1m14-4l1 4h-1M9 17v4m6-4v4"/></svg>`,
  check: `<svg fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`,
};

// ── FETCH ──
async function fetchSheet(name, headerRows = 1) {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=${headerRows}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const txt = await res.text();
  const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\)/);
  if (!m) throw new Error("Invalid response from Google Sheets");
  const tbl = JSON.parse(m[1]).table;
  const headers = tbl.cols.map((c, i) => (c.label || "").trim() || `col_${i}`);
  return tbl.rows.map(r => {
    const obj = {};
    headers.forEach((h, i) => {
      const cell = (r.c && r.c[i]) ? r.c[i] : null;
      if (!cell) { obj[h] = null; return; }
      obj[h] = (cell.v !== undefined && cell.v !== null) ? cell.v : (cell.f || null);
    });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v !== null && v !== ""));
}

// ── FETCH via CSV export (bypasses filters!) ──
function parseCSV(text) {
  const rows = [];
  let current = [];
  let field = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { current.push(field); field = ""; }
      else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
        current.push(field); field = "";
        if (current.some(c => c !== "")) rows.push(current);
        current = [];
        if (ch === '\r') i++;
      } else { field += ch; }
    }
  }
  if (field || current.length) { current.push(field); if (current.some(c => c !== "")) rows.push(current); }
  return rows;
}

async function fetchSheetCSV(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`CSV export HTTP ${res.status}`);
  const txt = await res.text();
  const parsed = parseCSV(txt);
  if (parsed.length < 2) return [];
  const headers = parsed[0].map(h => h.trim());
  return parsed.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => {
      let val = (row[i] || "").trim();
      // Try to parse numbers (handle €2,500.00 or 2 500,00 € or plain 2500)
      if (val.match(/^[€$]?\s*[\d\s.,]+\s*[€$]?\s*$/)) {
        // Detect European format: "2 500,00" (space=thousands, comma=decimal)
        let cleaned = val.replace(/[€$]/g, "").trim();
        if (cleaned.match(/\d+[\s.]\d{3}/) && cleaned.includes(",")) {
          // European: replace spaces/dots as thousands sep, comma as decimal
          cleaned = cleaned.replace(/[\s.]/g, "").replace(",", ".");
        } else {
          // US/standard: remove commas and spaces
          cleaned = cleaned.replace(/[\s,]/g, "");
        }
        const num = parseFloat(cleaned);
        if (!isNaN(num)) { obj[h] = num; return; }
      }
      obj[h] = val || null;
    });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v !== null && v !== ""));
}

// ── Helpers ──
function normOrg(name) { return (name || "").toLowerCase().replace(/\s+/g, "").replace(/[^a-z0-9]/g, ""); }
function fmt(n) { return n != null ? "€" + Math.round(n).toLocaleString("fr-FR") : "—"; }
function pct(n, d) { return d ? Math.round(n / d * 100) + "%" : "—"; }
function getDaysUntil(dateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.max(0, Math.ceil((new Date(dateStr + "T00:00:00") - now) / 86400000));
}

function circularProgress(pctVal, size = 140, stroke = 10) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const clamped = Math.min(pctVal, 100);
  const offset = circ - (clamped / 100) * circ;
  const color = pctVal >= 100 ? "#10b981" : pctVal >= 70 ? "#6366f1" : pctVal >= 40 ? "#f59e0b" : "#ef4444";
  return `<svg width="${size}" height="${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 0.8s ease"/>
    <text x="${size/2}" y="${size/2 - 8}" text-anchor="middle" dominant-baseline="middle"
      style="font-size:22px;font-weight:700;fill:#111827">${Math.round(pctVal)}%</text>
    <text x="${size/2}" y="${size/2 + 14}" text-anchor="middle" dominant-baseline="middle"
      style="font-size:11px;fill:#6b7280">of break-even</text>
  </svg>`;
}

// ── Normalize SUMMARY row keys ──
// gviz headers=2 may prefix merged row text, e.g.
// "2026 LIVE PIPELINE Quota 2026" instead of "Quota 2026"
// We remap all keys to clean short names
function normalizeSummaryRow(row) {
  if (!row) return row;
  var clean = {};
  var keys = Object.keys(row);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var kl = k.toLowerCase();
    // Skip percentage/ratio columns (start with %) — they would overwrite real count columns
    if (kl.startsWith("%")) continue;
    // Map to clean key names
    if (kl === "category") clean["Category"] = row[k];
    else if (kl.includes("quota 2025")) clean["Quota 2025"] = row[k];
    else if (kl.includes("registered 2025")) clean["Registered 2025"] = row[k];
    else if (kl.includes("attended 2025")) clean["Attended 2025"] = row[k];
    else if (kl.includes("confirmed 2025")) clean["Confirmed 2025"] = row[k];
    else if (kl.includes("quota 2026")) clean["Quota 2026"] = row[k];
    else if (kl.includes("estimation 2026")) clean["Estimation 2026"] = row[k];
    // "Registered names" OR just "Registered" (col label varies)
    else if (kl.includes("registered names") || kl === "registered") clean["Registered names"] = row[k];
    else if (kl.includes("pending names")) clean["Pending names"] = row[k];
    else if (kl.includes("total guests")) clean["Total Guests (with pending names)"] = row[k];
    else if (kl.includes("current estimate")) clean["Current Estimate (Confirmed + Pending)"] = row[k];
    else if (kl === "confirmed" || kl.endsWith(" confirmed")) { if (!clean["Confirmed"]) clean["Confirmed"] = row[k]; }
    else if (kl === "pending" || (kl.endsWith(" pending") && !kl.includes("names"))) { if (!clean["Pending"]) clean["Pending"] = row[k]; }
    else if (kl === "no shuttle" || kl.endsWith(" no shuttle")) clean["No shuttle"] = row[k];
    else if (kl === "shuttle" || kl.endsWith(" shuttle")) clean["Shuttle"] = row[k];
    else if (kl === "coach" || kl.endsWith(" coach")) clean["Coach"] = row[k];
    else if (kl === "van" || kl.endsWith(" van")) clean["Van"] = row[k];
    else if (kl === "attended" || (kl.endsWith(" attended") && !kl.includes("2025"))) clean["Attended"] = row[k];
    else if (kl === "declined" || kl.endsWith(" declined")) clean["Declined"] = row[k];
    else if (kl === "revenue" || kl.endsWith(" revenue")) clean["Revenue"] = row[k];
    else if (kl === "no show" || kl.endsWith(" no show")) clean["No Show"] = row[k];
  }
  return clean;
}

// ── PROCESS DATA ──
function processData(allGuests, sponsorTables, rawSummary) {
  // Normalize summary column names (gviz headers=2 prefixes merged row text)
  var summary = rawSummary.map(normalizeSummaryRow);
  const ag = allGuests.filter(r => r["REGISTRANT TYPE"]);
  const tables = sponsorTables.filter(r => r["SPONSOR'S TABLES"]);

  // Separate confirmed vs pending sponsor tables (COMMENT column)
  const confirmedTables = tables.filter(t => !(t["COMMENT"] || "").toString().toUpperCase().includes("PENDING"));
  const pendingTables = tables.filter(t => (t["COMMENT"] || "").toString().toUpperCase().includes("PENDING"));

  const confirmedTableRevenue = confirmedTables.reduce((s, r) => s + (parseFloat(r["TABLE REVENUE"]) || 0), 0);
  const pendingTableRevenue = pendingTables.reduce((s, r) => s + (parseFloat(r["TABLE REVENUE"]) || 0), 0);
  const totalTableRevenue = confirmedTableRevenue + pendingTableRevenue;

  // Table equivalents: 10 seats = 1 table, 5 seats = 0.5
  const confirmedTableEquiv = confirmedTables.reduce((s, r) => s + ((parseFloat(r["CONTRACT"]) || 0) / 10), 0);
  const pendingTableEquiv = pendingTables.reduce((s, r) => s + ((parseFloat(r["CONTRACT"]) || 0) / 10), 0);
  const totalTableSeats = tables.reduce((s, r) => s + (parseFloat(r["CONTRACT"]) || 0), 0);
  const confirmedTableSeats = confirmedTables.reduce((s, r) => s + (parseFloat(r["CONTRACT"]) || 0), 0);
  const pendingTableSeats = pendingTables.reduce((s, r) => s + (parseFloat(r["CONTRACT"]) || 0), 0);

  // By type
  const byType = {};
  ag.forEach(r => {
    const t = r["REGISTRANT TYPE"];
    if (!byType[t]) byType[t] = { count: 0, registered: 0, amount: 0, confirmed: 0, shuttle: 0 };
    byType[t].count++;
    if (r["FULL NAME"] && String(r["FULL NAME"]).trim()) byType[t].registered++;
    byType[t].amount += parseFloat(r["AMOUNT ALLOCATED TO THE VIP DINNER"]) || 0;
    const rsvp = (r["RSVP STATUS"] || "").toLowerCase();
    if (rsvp === "attending" || rsvp === "confirmed") byType[t].confirmed++;
    if ((r["SHUTTLE"] || "").toString().toLowerCase() === "coach" || (r["SHUTTLE"] || "").toString().toLowerCase() === "van") byType[t].shuttle++;
  });

  const ticketRevenue = (byType["Contract ticket"]?.amount || 0) + (byType["Ticket"]?.amount || 0);
  const confirmedRevenue = ticketRevenue + confirmedTableRevenue;
  const totalRevenue = ticketRevenue + totalTableRevenue;

  // RSVP from SUMMARY sheet (source of truth)
  const summaryTotal = summary.find(r => (r["Category"] || "").toLowerCase() === "total");
  const rsvpFromSummary = {
    confirmed: summaryTotal ? (parseInt(summaryTotal["Confirmed"]) || 0) : 0,
    pending: summaryTotal ? (parseInt(summaryTotal["Pending"]) || 0) : 0,
    declined: summaryTotal ? (parseInt(summaryTotal["Declined"]) || 0) : 0,
  };

  // RSVP from ALL GUESTS (for the breakdown we still need it)
  const rsvpFromSheet = { attending: 0, notAttending: 0, noRsvp: 0 };
  ag.forEach(r => {
    const s = (r["RSVP STATUS"] || "").toLowerCase().trim();
    if (s === "attending" || s === "confirmed") rsvpFromSheet.attending++;
    else if (s.includes("not attending") || s === "declined" || s === "cancelled") rsvpFromSheet.notAttending++;
    else rsvpFromSheet.noRsvp++;
  });

  // Build set of sponsor org names (normalized) for matching
  const sponsorOrgNorms = new Set(tables.map(t => normOrg(t["SPONSOR'S TABLES"] || "")));

  // Sponsor details — with speaker-in-delegation detection
  const sponsorDetails = tables.map(t => {
    const orgName = t["SPONSOR'S TABLES"] || "";
    const normName = normOrg(orgName);
    const isPending = (t["COMMENT"] || "").toString().toUpperCase().includes("PENDING");
    const matchGuests = ag.filter(g => g["REGISTRANT TYPE"] === "Contract table" && normOrg(g["ORGANIZATION"]) === normName);
    const regGuests = matchGuests.filter(g => g["FULL NAME"] && String(g["FULL NAME"]).trim());
    const confGuests = matchGuests.filter(g => { const s = (g["RSVP STATUS"]||"").toLowerCase(); return s === "attending" || s === "confirmed"; });

    // Case 1: Contract table guests with OWNER=Content → speakers still in delegation
    const speakersStillIn = matchGuests.filter(g => (g["OWNER"] || "").toLowerCase() === "content");

    // Case 2: Free speakers whose ORG matches this sponsor → speakers extracted from delegation
    const speakersExtracted = ag.filter(g =>
      g["REGISTRANT TYPE"] === "Free speaker" &&
      normOrg(g["ORGANIZATION"]) === normName
    );

    const allLinkedSpeakers = [...speakersStillIn, ...speakersExtracted];

    // Quota logic: official delegation = guests NOT owned by Content
    const officialDelegation = matchGuests.filter(g => (g["OWNER"] || "").toLowerCase() !== "content");
    const officialRegistered = officialDelegation.filter(g => g["FULL NAME"] && String(g["FULL NAME"]).trim());
    const officialConfirmed = officialDelegation.filter(g => { const s = (g["RSVP STATUS"]||"").toLowerCase(); return s === "attending" || s === "confirmed"; });
    const seats = parseFloat(t["CONTRACT"]) || 0;
    const seatsRemaining = seats - officialDelegation.length;

    return {
      cs: t["CS"] || "", name: orgName, isPending,
      contract: seats,
      tableEquiv: seats / 10,
      revenue: parseFloat(t["TABLE REVENUE"]) || 0,
      totalGuests: matchGuests.length, registered: regGuests.length, confirmed: confGuests.length,
      // Quota
      officialDelegation: officialDelegation.length,
      officialRegistered: officialRegistered.length,
      officialConfirmed: officialConfirmed.length,
      seatsRemaining,
      // Speakers
      speakersInDelegation: speakersStillIn.length,
      speakersExtracted: speakersExtracted.length,
      totalLinkedSpeakers: allLinkedSpeakers.length,
    };
  });

  // All speakers linked to sponsors (unified list for the detail section)
  // Case A: Contract table/ticket with OWNER=Content → still in delegation
  const speakersStillInDelegation = ag.filter(g =>
    (g["REGISTRANT TYPE"] === "Contract table" || g["REGISTRANT TYPE"] === "Contract ticket") &&
    (g["OWNER"] || "").toLowerCase() === "content"
  ).map(g => ({
    name: g["FULL NAME"] || "—",
    org: g["ORGANIZATION"] || "—",
    currentType: g["REGISTRANT TYPE"],
    status: "in_delegation",
    rsvp: g["RSVP STATUS"] || "",
  }));

  // Case B: Free speakers whose ORG matches a sponsor → extracted, but linked
  const speakersExtractedFromDelegation = ag.filter(g =>
    g["REGISTRANT TYPE"] === "Free speaker" &&
    sponsorOrgNorms.has(normOrg(g["ORGANIZATION"]))
  ).map(g => ({
    name: g["FULL NAME"] || "—",
    org: g["ORGANIZATION"] || "—",
    currentType: "Free speaker",
    status: "extracted",
    rsvp: g["RSVP STATUS"] || "",
  }));

  const allSpeakersSponsorLinked = [...speakersStillInDelegation, ...speakersExtractedFromDelegation];

  const shuttleCount = ag.filter(r => (r["SHUTTLE"] || "").toString().toLowerCase() === "coach" || (r["SHUTTLE"] || "").toString().toLowerCase() === "van").length;
  // Shuttle among confirmed guests
  const shuttleConfirmed = ag.filter(r => {
    const rsvp = (r["RSVP STATUS"] || "").toLowerCase();
    const shuttle = (r["SHUTTLE"] || "").toString().toLowerCase();
    return (rsvp === "attending" || rsvp === "confirmed") && (shuttle === "coach" || shuttle === "van");
  }).length;

  // Dietary requirements from NOTES column
  const dietKeywords = ["vegan","vegetarian","veggie","halal","kosher","gluten","allerg","celiac","coeliac","lactose","dairy","nut","pescatarian","diet","intoleran","no pork","no meat","no fish","no alcohol","sans","régime","végétar","végétal"];
  const dietaryRequests = ag.filter(r => {
    const notes = (r["NOTES"] || "").toString().toLowerCase();
    return notes && dietKeywords.some(kw => notes.includes(kw));
  }).map(r => ({
    name: r["FULL NAME"] || "—",
    org: r["ORGANIZATION"] || "—",
    type: r["REGISTRANT TYPE"] || "—",
    note: r["NOTES"],
    rsvp: r["RSVP STATUS"] || "",
  }));

  const summaryRows = summary.filter(r => r["Category"] && !["total","coe staff (seated)"].includes((r["Category"]||"").toLowerCase()));

  return {
    pbw: {
      totalRevenue, confirmedRevenue, pendingRevenue: pendingTableRevenue,
      ticketRevenue, tableRevenue: totalTableRevenue,
      confirmedTableRevenue, pendingTableRevenue,
      // Exclude CoE staff from guest counts (matches SUMMARY sheet logic)
      totalGuests: ag.filter(r => (r["REGISTRANT TYPE"] || "").toLowerCase() !== "coe staff (seated)").length,
      registeredGuests: ag.filter(r => r["FULL NAME"] && String(r["FULL NAME"]).trim() && (r["REGISTRANT TYPE"] || "").toLowerCase() !== "coe staff (seated)").length,
      totalTableSeats, confirmedTableSeats, pendingTableSeats,
      confirmedTableEquiv, pendingTableEquiv,
      totalTableEquiv: confirmedTableEquiv + pendingTableEquiv,
      sponsorTableCount: tables.length,
      confirmedTableCount: confirmedTables.length,
      pendingTableCount: pendingTables.length,
      byType, rsvpFromSummary, rsvpFromSheet,
      sponsorDetails, allSpeakersSponsorLinked, shuttleCount, shuttleConfirmed,
      dietaryRequests,
      confirmedGuestsCount: rsvpFromSheet.attending,
      summary: summaryTotal ? {
        quota2026: parseFloat(summaryTotal["Quota 2026"]) || 0,
        registered2026: parseFloat(summaryTotal["Registered names"]) || 0,
        confirmed2026: parseFloat(summaryTotal["Confirmed"]) || 0,
        pending2026: parseFloat(summaryTotal["Pending"]) || 0,
        revenue2026: parseFloat(summaryTotal["Revenue"]) || 0,
        attended2025: parseFloat(summaryTotal["Attended 2025"]) || 0,
        quota2025: parseFloat(summaryTotal["Quota 2025"]) || 0,
        shuttle2026: parseFloat(summaryTotal["Shuttle"]) || 0,
        coach2026: parseFloat(summaryTotal["Coach"]) || 0,
        van2026: parseFloat(summaryTotal["Van"]) || 0,
        noShuttle2026: parseFloat(summaryTotal["No shuttle"]) || 0,
        totalGuests2026: parseFloat(summaryTotal["Total Guests (with pending names)"]) || 0,
        currentEstimate2026: parseFloat(summaryTotal["Current Estimate (Confirmed + Pending)"]) || 0,
      } : null,
      summaryRows,
      // Transport breakdown by category from SUMMARY
      transportByCategory: summaryRows.filter(r =>
        (r["Category"] || "").toLowerCase() !== "total" &&
        !((r["Category"] || "").toLowerCase().startsWith("→")) &&
        ((parseInt(r["Shuttle"]) || 0) > 0 || (parseInt(r["No shuttle"]) || 0) > 0)
      ).map(r => ({
        category: r["Category"],
        shuttle: parseInt(r["Shuttle"]) || 0,
        coach: parseInt(r["Coach"]) || 0,
        van: parseInt(r["Van"]) || 0,
        noShuttle: parseInt(r["No shuttle"]) || 0,
      })),
    },
    raise: null,
  };
}

// ── Quota rows builder (avoids nested template literals) ──
function buildQuotaRows(ev) {
  var html = "";
  var skipCats = ["walk-in", "vip dinner single ticket"];

  // Main categories (not sub-items starting with →)
  ev.summaryRows.filter(function(r) {
    var cat = (r["Category"] || "").toLowerCase();
    return !cat.startsWith("→") && skipCats.indexOf(cat) === -1;
  }).forEach(function(r) {
    var quota = parseFloat(r["Quota 2026"]) || 0;
    var reg = parseInt(r["Registered names"]) || 0;
    var conf = parseInt(r["Confirmed"]) || 0;
    var pend = parseInt(r["Pending"]) || 0;
    var estimate = parseInt(r["Current Estimate (Confirmed + Pending)"]) || (conf + pend);
    var progPct = quota > 0 ? Math.min(Math.round(estimate / quota * 100), 100) : 0;
    var progColor = progPct >= 80 ? "var(--green)" : progPct >= 50 ? "var(--amber)" : "var(--red)";
    var rev = r["Revenue"];
    html += '<tr>';
    html += '<td class="b">' + r["Category"] + '</td>';
    html += '<td class="c">' + (quota || "—") + '</td>';
    html += '<td class="c">' + reg + '</td>';
    html += '<td class="c">' + conf + '</td>';
    html += '<td class="c">' + pend + '</td>';
    html += '<td><div style="display:flex;align-items:center;gap:8px">';
    html += '<div class="minibar" style="width:100px"><div class="minibar-fill" style="width:' + progPct + '%;background:' + progColor + '"></div></div>';
    html += '<span style="font-size:12px;font-weight:600;color:' + progColor + '">' + estimate + '/' + (quota || "—") + (quota ? ' (' + progPct + '%)' : '') + '</span>';
    html += '</div></td>';
    html += '<td class="r">' + (rev != null && rev !== 0 ? fmt(rev) : '<span style="color:var(--light)">—</span>') + '</td>';
    html += '</tr>';
  });

  // Sub-categories (→ Contract ticket, → Contract table)
  ev.summaryRows.filter(function(r) {
    return (r["Category"] || "").startsWith("→");
  }).forEach(function(r) {
    var quota = parseFloat(r["Quota 2026"]) || 0;
    var reg = parseInt(r["Registered names"]) || 0;
    var conf = parseInt(r["Confirmed"]) || 0;
    var pend = parseInt(r["Pending"]) || 0;
    var estimate = parseInt(r["Current Estimate (Confirmed + Pending)"]) || (conf + pend);
    var progPct = quota > 0 ? Math.min(Math.round(estimate / quota * 100), 100) : 0;
    var progColor = progPct >= 80 ? "var(--green)" : progPct >= 50 ? "var(--amber)" : "var(--red)";
    var rev = r["Revenue"];
    html += '<tr style="color:var(--muted)">';
    html += '<td style="padding-left:28px;font-size:12px">' + r["Category"] + '</td>';
    html += '<td class="c" style="font-size:12px">' + (quota || "—") + '</td>';
    html += '<td class="c" style="font-size:12px">' + reg + '</td>';
    html += '<td class="c" style="font-size:12px">' + conf + '</td>';
    html += '<td class="c" style="font-size:12px">' + pend + '</td>';
    html += '<td><div style="display:flex;align-items:center;gap:8px">';
    html += '<div class="minibar" style="width:100px;height:6px"><div class="minibar-fill" style="width:' + progPct + '%;background:' + progColor + ';height:6px"></div></div>';
    html += '<span style="font-size:11px;color:' + progColor + '">' + estimate + '/' + (quota || "—") + '</span>';
    html += '</div></td>';
    html += '<td class="r" style="font-size:12px">' + (rev != null && rev !== 0 ? fmt(rev) : '<span style="color:var(--light)">—</span>') + '</td>';
    html += '</tr>';
  });

  // Total row
  if (ev.summary) {
    var totalEst = ev.summary.confirmed2026 + ev.summary.pending2026;
    var totalPct = Math.round(totalEst / ev.summary.quota2026 * 100);
    html += '<tr class="total-row">';
    html += '<td>TOTAL</td>';
    html += '<td class="c">' + ev.summary.quota2026 + '</td>';
    html += '<td class="c">' + ev.summary.registered2026 + '</td>';
    html += '<td class="c">' + ev.summary.confirmed2026 + '</td>';
    html += '<td class="c">' + ev.summary.pending2026 + '</td>';
    html += '<td><div style="display:flex;align-items:center;gap:8px">';
    html += '<div class="minibar" style="width:100px"><div class="minibar-fill" style="width:' + Math.min(totalPct, 100) + '%;background:var(--indigo)"></div></div>';
    html += '<span style="font-size:12px;font-weight:700;color:var(--indigo)">' + totalEst + '/' + ev.summary.quota2026 + ' (' + totalPct + '%)</span>';
    html += '</div></td>';
    html += '<td class="r">' + fmt(ev.summary.revenue2026) + '</td>';
    html += '</tr>';
  }
  return html;
}

              <td class="r">${fmt(ev.tableRevenue)}</td>
              <td class="c">${ev.totalTableSeats}</td>
              <td class="c">${ev.sponsorDetails.reduce((s,t)=>s+t.officialRegistered,0)} / ${ev.sponsorDetails.reduce((s,t)=>s+t.officialDelegation,0)}</td>
              <td class="c">${ev.sponsorDetails.reduce((s,t)=>s+t.seatsRemaining,0)}</td>
              <td class="c" style="color:var(--purple);font-weight:600">${ev.sponsorDetails.reduce((s,t)=>s+t.totalLinkedSpeakers,0)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Speakers linked to Sponsors -->
    ${ev.allSpeakersSponsorLinked.length > 0 ? `
    <div class="section" style="border-left:3px solid var(--purple)">
      <div class="section-head">
        <h3>Speakers Linked to Sponsors</h3>
        <span class="section-badge" style="background:#ede9fe;color:#7c3aed">${ev.allSpeakersSponsorLinked.length} speaker${ev.allSpeakersSponsorLinked.length !== 1 ? 's' : ''}</span>
      </div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">
        Speakers whose organization matches a sponsor table. <span style="color:var(--purple);font-weight:600">In delegation</span> = still listed as Contract table/ticket (OWNER = Content). <span style="color:var(--amber);font-weight:600">Extracted</span> = moved to Free speaker but org still matches a sponsor. If a sponsor reclaims them, they'll flip back to "In delegation".
      </p>
      <table>
        <thead><tr><th>Speaker</th><th>Sponsor (Org)</th><th>Current Status</th><th>RSVP</th></tr></thead>
        <tbody>
          ${ev.allSpeakersSponsorLinked.map(s => {
            const statusBadge = s.status === "in_delegation"
              ? '<span class="badge" style="background:#ede9fe;color:#7c3aed">In delegation (' + s.currentType + ')</span>'
              : '<span class="badge" style="background:#fef3c7;color:#92400e">Extracted (Free speaker)</span>';
            const rsvpBadge = s.rsvp
              ? (s.rsvp.toLowerCase().includes("attending") ? '<span class="badge badge-green">Attending</span>'
                : s.rsvp.toLowerCase().includes("not") ? '<span class="badge badge-red">Declined</span>'
                : '<span class="badge badge-gray">' + s.rsvp + '</span>')
              : '<span class="badge badge-gray">No RSVP</span>';
            return `<tr>
              <td class="b">${s.name}</td>
              <td>${s.org}</td>
              <td>${statusBadge}</td>
              <td>${rsvpBadge}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>` : ''}

    <!-- 2025 vs 2026 Comparison -->
    ${ev.summaryRows && ev.summaryRows.length > 0 ? `
    <div class="section">
      <div class="section-head"><h3>2025 vs 2026 Comparison</h3></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Category</th>
            <th class="c">Quota 2025</th><th class="c">Registered 2025</th><th class="c">Attended 2025</th>
            <th class="c" style="border-left:2px solid var(--indigo)">Quota 2026</th><th class="c">Registered</th><th class="c">Confirmed</th><th class="c">Pending</th>
            <th class="r">Revenue</th>
          </tr></thead>
          <tbody>
            ${ev.summaryRows.map(r => `
              <tr>
                <td class="b">${r["Category"]}</td>
                <td class="c">${r["Quota 2025"] ?? "—"}</td>
                <td class="c">${r["Registered 2025"] ?? "—"}</td>
                <td class="c">${r["Attended 2025"] ?? "—"}</td>
                <td class="c" style="border-left:2px solid #e0e0ff">${r["Quota 2026"] ?? "—"}</td>
                <td class="c">${r["Registered names"] ?? "—"}</td>
                <td class="c">${r["Confirmed"] ?? "—"}</td>
                <td class="c">${r["Pending"] ?? "—"}</td>
                <td class="r">${r["Revenue"] != null ? fmt(r["Revenue"]) : "—"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>` : ""}

    <!-- Transport / Shuttle -->
    <div class="section">
      <div class="section-head"><h3>Transport &amp; Navettes</h3><span class="section-badge">${ev.summary ? ev.summary.shuttle2026 : ev.shuttleCount} avec transport</span></div>
      <div class="grid-2" style="margin-top:0">
        <div>
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
            <div class="kpi-icon" style="background:#ef444415;width:48px;height:48px;border-radius:12px">${ICONS.shuttle}</div>
            <div>
              <div style="font-size:28px;font-weight:700;color:var(--amber)">${shuttlePctConfirmed}%</div>
              <div style="font-size:12px;color:var(--muted)">des guests confirmés prennent le transport</div>
            </div>
          </div>
          <div class="rsvp-prog" style="margin-bottom:12px">
            <div class="rsvp-prog-top"><span>Transport parmi confirmés (${ev.shuttleConfirmed} / ${ev.confirmedGuestsCount})</span><span>${shuttlePctConfirmed}%</span></div>
            <div class="minibar" style="height:12px;border-radius:6px"><div class="minibar-fill" style="width:${shuttlePctConfirmed}%;background:var(--amber);border-radius:6px"></div></div>
          </div>
          ${ev.summary ? `
          <div style="display:flex;gap:12px;margin-top:16px">
            <div style="flex:1;background:#f0f9ff;border-radius:10px;padding:14px;text-align:center">
              <div style="font-size:24px;font-weight:700;color:#2563eb">${ev.summary.coach2026}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">Bus</div>
              <div style="font-size:11px;color:#2563eb;font-weight:600">${ev.summary.shuttle2026 > 0 ? Math.round(ev.summary.coach2026 / ev.summary.shuttle2026 * 100) : 0}%</div>
            </div>
            <div style="flex:1;background:#fef3c7;border-radius:10px;padding:14px;text-align:center">
              <div style="font-size:24px;font-weight:700;color:#d97706">${ev.summary.van2026}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">Van</div>
              <div style="font-size:11px;color:#d97706;font-weight:600">${ev.summary.shuttle2026 > 0 ? Math.round(ev.summary.van2026 / ev.summary.shuttle2026 * 100) : 0}%</div>
            </div>
            <div style="flex:1;background:#f1f5f9;border-radius:10px;padding:14px;text-align:center">
              <div style="font-size:24px;font-weight:700;color:#64748b">${ev.summary.noShuttle2026}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">Sans navette</div>
            </div>
          </div>
          ` : ''}
        </div>
        <div>
          <table>
            <thead><tr><th>Catégorie</th><th class="c">Transport</th><th class="c">Bus</th><th class="c">Van</th><th class="c">Sans</th></tr></thead>
            <tbody>
              ${(ev.transportByCategory || []).map(t => `
                <tr>
                  <td class="b">${t.category}</td>
                  <td class="c">${t.shuttle}</td>
                  <td class="c">${t.coach}</td>
                  <td class="c" style="color:var(--amber);font-weight:600">${t.van > 0 ? t.van : '—'}</td>
                  <td class="c" style="color:var(--muted)">${t.noShuttle > 0 ? t.noShuttle : '—'}</td>
                </tr>
              `).join("")}
              <tr class="total-row">
                <td>TOTAL</td>
                <td class="c">${ev.summary ? ev.summary.shuttle2026 : ev.shuttleCount}</td>
                <td class="c">${ev.summary ? ev.summary.coach2026 : '—'}</td>
                <td class="c" style="color:var(--amber);font-weight:600">${ev.summary ? ev.summary.van2026 : '—'}</td>
                <td class="c">${ev.summary ? ev.summary.noShuttle2026 : '—'}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Dietary Requirements -->
    <div class="section">
      <div class="section-head">
        <h3>Dietary Requirements</h3>
        <span class="section-badge">${ev.dietaryRequests.length} request${ev.dietaryRequests.length !== 1 ? 's' : ''}</span>
      </div>
      ${ev.dietaryRequests.length > 0 ? `
      <table>
        <thead><tr><th>Guest</th><th>Organization</th><th>Type</th><th>Requirement (from Notes)</th><th>RSVP</th></tr></thead>
        <tbody>
          ${ev.dietaryRequests.map(d => `
            <tr>
              <td class="b">${d.name}</td>
              <td>${d.org}</td>
              <td>${d.type}</td>
              <td>${d.note}</td>
              <td>${d.rsvp ? (d.rsvp.toLowerCase().includes("attending") ? '<span class="badge badge-green">Attending</span>' : d.rsvp.toLowerCase().includes("not") ? '<span class="badge badge-red">Declined</span>' : '<span class="badge badge-gray">' + d.rsvp + '</span>') : '<span class="badge badge-gray">No RSVP</span>'}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      ` : `<div style="text-align:center;padding:32px 20px;color:var(--muted)">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:8px"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <p>No dietary requirements flagged yet.</p>
        <p style="font-size:11px;margin-top:4px">Dietary keywords in the NOTES column will appear here automatically.</p>
      </div>`}
    </div>
  `;
}

function switchEvent(key) { activeEvent = key; render(); }

async function loadAndRender() {
  try {
    let ag;
    try {
      ag = await fetchSheetCSV(0);        // CSV export bypasses sheet filters
      console.log("ALL GUESTS via CSV:", ag.length, "rows");
    } catch (csvErr) {
      console.warn("CSV export failed, falling back to gviz:", csvErr);
      ag = await fetchSheet("ALL GUESTS", 1);
      console.log("ALL GUESTS via gviz:", ag.length, "rows");
    }
    const [st, su] = await Promise.all([
      fetchSheet("SPONSOR TABLES", 1),
      fetchSheet("SUMMARY", 2),
    ]);
    console.log("SPONSOR TABLES:", st.length, "rows | SUMMARY:", su.length, "rows");
    EVENTS = processData(ag, st, su);
    lastRefresh = new Date();
    render();
  } catch (err) {
    console.error("Dashboard error:", err);
    document.getElementById("app").innerHTML = `
      <div class="error-box">
        <strong>Failed to load data</strong><br>${err.message}<br><br>
        <small>Make sure the Google Sheet is shared as "Anyone with the link" → Viewer.<br>
        This dashboard must be served over HTTPS (GitHub Pages), not opened locally.</small>
      </div>`;
  }
}

loadAndRender();
setInterval(loadAndRender, CONFIG.refreshMs);
</script>
</body>
</html>
